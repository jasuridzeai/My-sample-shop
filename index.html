<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Доставка еды</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #2eaa4a;
    --green-dark: #1e8a38;
    --green-light: #e8f7ec;
    --red: #e03030;
    --orange: #f5a623;
    --text: #1a1a1a;
    --text-muted: #888;
    --bg: #f4f4f4;
    --white: #ffffff;
    --card-radius: 16px;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: 'Nunito', sans-serif; color: var(--text); overflow: hidden; }

  /* HEADER */
  .header {
    background: var(--white);
    padding: 12px 16px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #eee;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    background: var(--green);
    color: white;
    font-weight: 900;
    font-size: 18px;
    padding: 4px 10px;
    border-radius: 8px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }
  .search-bar {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    background: #f0f0f0;
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
  }
  .search-bar svg { flex-shrink: 0; }

  /* SCROLL WRAPPER */
  .page {
    height: calc(100vh - 56px - 60px);
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }
  .page::-webkit-scrollbar { display: none; }

  /* ADDRESS BANNER */
  .address-banner {
    margin: 12px 12px 0;
    background: var(--white);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    border: 1px solid #eee;
    animation: fadeSlide .4s ease both;
  }
  .address-left { display: flex; align-items: center; gap: 10px; }
  .address-icon {
    width: 36px; height: 36px;
    background: var(--green-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .address-title { font-weight: 700; font-size: 14px; }
  .address-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .address-chevron { color: var(--text-muted); }

  /* CATEGORIES */
  .cats-scroll {
    padding: 14px 12px 0;
    display: flex;
    gap: 10px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    animation: fadeSlide .45s ease both;
  }
  .cats-scroll::-webkit-scrollbar { display: none; }
  .cat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    flex-shrink: 0;
    min-width: 64px;
  }
  .cat-icon {
    width: 56px; height: 56px;
    border-radius: var(--radius);
    background: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    border: 2px solid transparent;
    transition: all .2s;
    box-shadow: 0 2px 8px rgba(0,0,0,.07);
  }
  .cat-item.active .cat-icon {
    border-color: var(--green);
    background: var(--green-light);
  }
  .cat-item:first-child .cat-icon { background: var(--red); }
  .cat-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-align: center; max-width: 60px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-item.active .cat-label { color: var(--green); }

  /* PROMO BANNER */
  .promo-wrap {
    padding: 14px 12px 0;
    animation: fadeSlide .5s ease both;
  }
  .promo-banner {
    background: var(--green);
    border-radius: var(--card-radius);
    padding: 18px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    overflow: hidden;
    position: relative;
    min-height: 130px;
    cursor: pointer;
  }
  .promo-left { z-index: 1; }
  .promo-badge {
    background: rgba(255,255,255,.2);
    color: white;
    font-size: 11px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 8px;
  }
  .promo-price-old {
    color: rgba(255,255,255,.6);
    font-size: 13px;
    text-decoration: line-through;
    font-weight: 600;
  }
  .promo-price {
    color: white;
    font-size: 30px;
    font-weight: 900;
    line-height: 1.1;
  }
  .promo-price span { font-size: 14px; font-weight: 700; }
  .promo-title {
    color: rgba(255,255,255,.85);
    font-size: 12px;
    font-weight: 600;
    margin-top: 6px;
  }
  .promo-img {
    font-size: 72px;
    position: absolute;
    right: -4px;
    bottom: -8px;
    opacity: .95;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,.15));
    line-height: 1;
  }
  .promo-dot-row {
    display: flex; gap: 5px; justify-content: center;
    margin-top: 10px;
  }
  .promo-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #ccc;
    cursor: pointer;
    transition: .2s;
  }
  .promo-dot.active { background: var(--green); width: 18px; border-radius: 3px; }

  /* SECTION TITLE */
  .section-title {
    padding: 18px 12px 10px;
    font-size: 20px;
    font-weight: 900;
    color: var(--text);
  }

  /* PRODUCT GRID */
  .products-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 0 12px 12px;
    animation: fadeSlide .6s ease both;
  }
  .product-card {
    background: var(--white);
    border-radius: var(--card-radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s;
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
    position: relative;
  }
  .product-card:active { transform: scale(.97); }
  .product-img {
    width: 100%;
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 56px;
    background: #fafafa;
  }
  .product-info { padding: 10px 10px 12px; }
  .product-name { font-size: 13px; font-weight: 800; line-height: 1.3; }
  .product-desc { font-size: 11px; color: var(--text-muted); margin-top: 3px; line-height: 1.4; }
  .product-bottom {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px;
  }
  .product-price { font-size: 15px; font-weight: 900; color: var(--text); }
  .product-price small { font-size: 10px; color: var(--text-muted); font-weight: 600; }
  .add-btn {
    width: 30px; height: 30px;
    background: var(--green);
    border: none; border-radius: 8px;
    color: white; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background .2s, transform .1s;
    font-family: 'Nunito', sans-serif;
    line-height: 1;
  }
  .add-btn:active { transform: scale(.9); background: var(--green-dark); }
  .badge-new {
    position: absolute; top: 8px; left: 8px;
    background: var(--orange);
    color: white; font-size: 10px; font-weight: 800;
    padding: 2px 7px; border-radius: 6px;
  }
  .badge-hot {
    position: absolute; top: 8px; left: 8px;
    background: var(--red);
    color: white; font-size: 10px; font-weight: 800;
    padding: 2px 7px; border-radius: 6px;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid #eee;
    display: flex;
    height: 60px;
    z-index: 200;
  }
  .nav-item {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-muted);
    cursor: pointer;
    transition: color .2s;
    position: relative;
  }
  .nav-item.active { color: var(--green); }
  .nav-item svg { transition: transform .2s; }
  .nav-item.active svg { transform: scale(1.15); }
  .cart-badge {
    position: absolute;
    top: 6px;
    background: var(--red);
    color: white;
    font-size: 9px;
    font-weight: 900;
    min-width: 16px; height: 16px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px;
    left: 50%; margin-left: 4px;
    display: none;
  }
  .cart-badge.show { display: flex; }

  /* CART SHEET */
  .cart-sheet {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-radius: 20px 20px 0 0;
    z-index: 300;
    transform: translateY(100%);
    transition: transform .35s cubic-bezier(.32,.72,0,1);
    max-height: 80vh;
    display: flex; flex-direction: column;
    box-shadow: 0 -4px 30px rgba(0,0,0,.15);
  }
  .cart-sheet.open { transform: translateY(0); }
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 299;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s;
  }
  .sheet-overlay.show { opacity: 1; pointer-events: all; }
  .sheet-handle {
    width: 36px; height: 4px;
    background: #ddd; border-radius: 2px;
    margin: 12px auto 8px;
    flex-shrink: 0;
  }
  .sheet-title { font-size: 18px; font-weight: 900; padding: 0 16px 12px; flex-shrink: 0; border-bottom: 1px solid #f0f0f0; }
  .cart-items { overflow-y: auto; flex: 1; padding: 12px 16px; }
  .cart-item { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
  .cart-item-icon { font-size: 32px; }
  .cart-item-name { font-size: 14px; font-weight: 700; flex: 1; }
  .cart-item-price { font-size: 13px; font-weight: 800; color: var(--green); }
  .qty-ctrl { display: flex; align-items: center; gap: 8px; }
  .qty-btn { width: 26px; height: 26px; border-radius: 6px; border: none; background: #f0f0f0; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; }
  .qty-num { font-size: 14px; font-weight: 800; min-width: 18px; text-align: center; }
  .cart-footer { padding: 14px 16px 24px; border-top: 1px solid #f0f0f0; flex-shrink: 0; }
  .cart-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .cart-total-label { font-size: 14px; color: var(--text-muted); font-weight: 600; }
  .cart-total-val { font-size: 20px; font-weight: 900; }
  .order-btn {
    width: 100%;
    background: var(--green);
    color: white;
    border: none;
    border-radius: var(--radius);
    padding: 14px;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    transition: background .2s, transform .1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .order-btn:active { background: var(--green-dark); transform: scale(.98); }
  .empty-cart { text-align: center; padding: 30px; color: var(--text-muted); }
  .empty-cart-icon { font-size: 48px; margin-bottom: 10px; }
  .empty-cart-text { font-size: 14px; font-weight: 600; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1a1a1a;
    color: white;
    padding: 10px 20px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 700;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 400;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">SHOP</div>
  <div class="search-bar">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    Поиск по меню
  </div>
</div>

<!-- PAGE CONTENT -->
<div class="page" id="page">

  <!-- ADDRESS -->
  <div class="address-banner">
    <div class="address-left">
      <div class="address-icon">🚶</div>
      <div>
        <div class="address-title">Укажите адрес</div>
        <div class="address-sub">Доставим за полчаса</div>
      </div>
    </div>
    <svg class="address-chevron" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
  </div>

  <!-- CATEGORIES -->
  <div class="cats-scroll" id="cats">
    <div class="cat-item active" onclick="filterCat(this,'all')">
      <div class="cat-icon">%</div>
      <div class="cat-label">Акции</div>
    </div>
    <div class="cat-item" onclick="filterCat(this,'burger')">
      <div class="cat-icon">🍔</div>
      <div class="cat-label">Бургеры</div>
    </div>
    <div class="cat-item" onclick="filterCat(this,'wrap')">
      <div class="cat-icon">🌯</div>
      <div class="cat-label">Лаваши</div>
    </div>
    <div class="cat-item" onclick="filterCat(this,'pizza')">
      <div class="cat-icon">🍕</div>
      <div class="cat-label">Пицца</div>
    </div>
    <div class="cat-item" onclick="filterCat(this,'drink')">
      <div class="cat-icon">🥤</div>
      <div class="cat-label">Напитки</div>
    </div>
    <div class="cat-item" onclick="filterCat(this,'dessert')">
      <div class="cat-icon">🍦</div>
      <div class="cat-label">Десерты</div>
    </div>
  </div>

  <!-- PROMO BANNER -->
  <div class="promo-wrap">
    <div class="promo-banner" id="promoBanner">
      <div class="promo-left">
        <div class="promo-badge">ВЕСЕННЯЯ АКЦИЯ</div>
        <div class="promo-price-old">74 500 сум</div>
        <div class="promo-price">63 000 <span>сум</span></div>
        <div class="promo-title">Combo 1 — бургер + картошка + напиток</div>
      </div>
      <div class="promo-img" id="promoImg">🌯</div>
    </div>
    <div class="promo-dot-row">
      <div class="promo-dot active" onclick="switchPromo(0)"></div>
      <div class="promo-dot" onclick="switchPromo(1)"></div>
      <div class="promo-dot" onclick="switchPromo(2)"></div>
    </div>
  </div>

  <!-- PRODUCTS -->
  <div class="section-title">🔥 Популярное</div>
  <div class="products-grid" id="grid"></div>

  <div style="height:10px"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="setNav(this)">
    <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V21H15v-6H9v6H3z"/></svg>
    Меню
  </div>
  <div class="nav-item" onclick="setNav(this)">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M4.22 4.22l2.12 2.12m11.32 11.32 2.12 2.12M2 12h3m14 0h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
    Рестораны
  </div>
  <div class="nav-item" onclick="openCart()">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
    <span class="cart-badge" id="cartBadge">0</span>
    Корзина
  </div>
  <div class="nav-item" onclick="setNav(this)">
    <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    Ещё
  </div>
</div>

<!-- CART SHEET -->
<div class="sheet-overlay" id="overlay" onclick="closeCart()"></div>
<div class="cart-sheet" id="cartSheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Ваша корзина</div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span class="cart-total-label">Итого:</span>
      <span class="cart-total-val" id="cartTotal">0 сум</span>
    </div>
    <button class="order-btn" onclick="placeOrder()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>
      Оформить заказ
    </button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const products = [
  { id:1, name:'Чизбургер', desc:'Сочная котлета, сыр, соус', price:32000, emoji:'🍔', cat:'burger', badge:'hot' },
  { id:2, name:'Лаваш с курицей', desc:'Сочная курица, овощи, соус', price:28000, emoji:'🌯', cat:'wrap', badge:'' },
  { id:3, name:'Пепперони', desc:'Томат, сыр, пепперони', price:45000, emoji:'🍕', cat:'pizza', badge:'new' },
  { id:4, name:'Кола 0.5л', desc:'Холодная, освежает', price:9000, emoji:'🥤', cat:'drink', badge:'' },
  { id:5, name:'Картошка фри', desc:'Хрустящая, с соусом', price:15000, emoji:'🍟', cat:'burger', badge:'' },
  { id:6, name:'Мороженое', desc:'Ванильное, шоколадное', price:12000, emoji:'🍦', cat:'dessert', badge:'new' },
  { id:7, name:'Хот-дог', desc:'Сосиска, горчица, кетчуп', price:18000, emoji:'🌭', cat:'wrap', badge:'' },
  { id:8, name:'Апельсиновый сок', desc:'Свежевыжатый', price:14000, emoji:'🍊', cat:'drink', badge:'' },
];

let cart = {};
let currentCat = 'all';

const promos = [
  { badge:'ВЕСЕННЯЯ АКЦИЯ', old:'74 500 сум', price:'63 000', sub:'сум', title:'Combo 1 — бургер + картошка + напиток', img:'🌯' },
  { badge:'ХИТИ НЕДЕЛИ', old:'38 000 сум', price:'29 900', sub:'сум', title:'Двойной чизбургер + кола бесплатно', img:'🍔' },
  { badge:'ТОЛЬКО СЕГОДНЯ', old:'52 000 сум', price:'41 500', sub:'сум', title:'Пицца Пепперони большая', img:'🍕' },
];

function renderGrid(cat) {
  const list = cat === 'all' ? products : products.filter(p => p.cat === cat);
  const grid = document.getElementById('grid');
  grid.innerHTML = list.map(p => `
    <div class="product-card" onclick="addToCart(${p.id})">
      ${p.badge === 'new' ? `<div class="badge-new">NEW</div>` : p.badge === 'hot' ? `<div class="badge-hot">🔥 ХИТ</div>` : ''}
      <div class="product-img">${p.emoji}</div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        <div class="product-bottom">
          <div class="product-price">${p.price.toLocaleString('ru-RU')} <small>сум</small></div>
          <button class="add-btn" onclick="event.stopPropagation(); addToCart(${p.id})">+</button>
        </div>
      </div>
    </div>
  `).join('');
}

function filterCat(el, cat) {
  document.querySelectorAll('.cat-item').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  currentCat = cat;
  renderGrid(cat);
}

function addToCart(id) {
  const p = products.find(x => x.id === id);
  if (!cart[id]) cart[id] = { ...p, qty: 0 };
  cart[id].qty++;
  updateCartBadge();
  showToast(`${p.emoji} ${p.name} добавлен`);
}

function updateCartBadge() {
  const total = Object.values(cart).reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = total;
  badge.classList.toggle('show', total > 0);
}

function openCart() {
  document.getElementById('cartSheet').classList.add('open');
  document.getElementById('overlay').classList.add('show');
  renderCart();
}

function closeCart() {
  document.getElementById('cartSheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

function renderCart() {
  const items = Object.values(cart).filter(i => i.qty > 0);
  const el = document.getElementById('cartItems');
  if (!items.length) {
    el.innerHTML = `<div class="empty-cart"><div class="empty-cart-icon">🛒</div><div class="empty-cart-text">Корзина пуста</div></div>`;
    document.getElementById('cartTotal').textContent = '0 сум';
    return;
  }
  el.innerHTML = items.map(i => `
    <div class="cart-item">
      <div class="cart-item-icon">${i.emoji}</div>
      <div class="cart-item-name">${i.name}</div>
      <div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${i.id},-1)">−</button>
          <span class="qty-num">${i.qty}</span>
          <button class="qty-btn" onclick="changeQty(${i.id},1)">+</button>
        </div>
        <div class="cart-item-price" style="text-align:center;margin-top:4px">${(i.price * i.qty).toLocaleString('ru-RU')} сум</div>
      </div>
    </div>
  `).join('');
  const total = items.reduce((s,i) => s + i.price * i.qty, 0);
  document.getElementById('cartTotal').textContent = total.toLocaleString('ru-RU') + ' сум';
}

function changeQty(id, delta) {
  if (!cart[id]) return;
  cart[id].qty += delta;
  if (cart[id].qty <= 0) delete cart[id];
  updateCartBadge();
  renderCart();
}

function placeOrder() {
  cart = {};
  updateCartBadge();
  closeCart();
  showToast('✅ Заказ оформлен! Ждите курьера');
}

function setNav(el) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

let promoIdx = 0;
function switchPromo(idx) {
  promoIdx = idx;
  const p = promos[idx];
  document.querySelector('.promo-badge').textContent = p.badge;
  document.querySelector('.promo-price-old').textContent = p.old;
  document.querySelector('.promo-price').innerHTML = `${p.price} <span>${p.sub}</span>`;
  document.querySelector('.promo-title').textContent = p.title;
  document.getElementById('promoImg').textContent = p.img;
  document.querySelectorAll('.promo-dot').forEach((d,i) => d.classList.toggle('active', i === idx));
}

setInterval(() => switchPromo((promoIdx + 1) % promos.length), 4000);

renderGrid('all');
</script>
</body>
</html>
